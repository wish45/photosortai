name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: PhotoSorterAI
  APP_VERSION: '1.0.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "APP_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-win.txt
          pip install pyinstaller

      - name: Cache InsightFace models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: insightface_models
          key: insightface-buffalo-l-v1

      - name: Download InsightFace buffalo_l model
        if: steps.cache-models.outputs.cache-hit != 'true'
        shell: python
        run: |
          import os, zipfile, urllib.request

          model_dir = os.path.join("insightface_models", "models", "buffalo_l")
          os.makedirs(model_dir, exist_ok=True)

          url = "https://github.com/deepinsight/insightface/releases/download/v0.7/buffalo_l.zip"
          zip_path = "buffalo_l.zip"

          print(f"Downloading {url} ...")
          urllib.request.urlretrieve(url, zip_path)

          print("Extracting ...")
          with zipfile.ZipFile(zip_path, "r") as zf:
              zf.extractall(os.path.join("insightface_models", "models"))

          os.remove(zip_path)
          print("Done. Model files:")
          for f in os.listdir(model_dir):
              print(f"  {f}")

      - name: Download VC++ Redistributable
        shell: powershell
        run: |
          $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $out = "vc_redist.x64.exe"
          Write-Host "Downloading VC++ Redistributable..."
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Write-Host "Downloaded: $((Get-Item $out).Length / 1MB) MB"

      - name: Build with PyInstaller
        run: |
          pyinstaller photosortai_win.spec --noconfirm
          echo "Build output:"
          dir dist\PhotoSorterAI

      - name: Verify critical DLLs in build
        shell: python
        run: |
          import os, sys

          dist_dir = os.path.join("dist", "PhotoSorterAI")

          critical_dlls = [
              'msvcp140.dll',
              'vcruntime140.dll',
              'vcruntime140_1.dll',
              'python311.dll',
          ]

          important_dlls = [
              'concrt140.dll',
              'msvcp140_1.dll',
          ]

          print("=== Critical DLL Check ===")
          missing_critical = []
          for dll in critical_dlls:
              path = os.path.join(dist_dir, dll)
              if os.path.isfile(path):
                  size = os.path.getsize(path)
                  print(f"  OK   {dll} ({size:,} bytes)")
              else:
                  print(f"  MISS {dll}")
                  missing_critical.append(dll)

          print("\n=== Important DLL Check ===")
          for dll in important_dlls:
              path = os.path.join(dist_dir, dll)
              if os.path.isfile(path):
                  size = os.path.getsize(path)
                  print(f"  OK   {dll} ({size:,} bytes)")
              else:
                  print(f"  WARN {dll} (not found, may not be needed)")

          # If critical DLLs are missing, copy from system
          if missing_critical:
              print(f"\n=== Copying missing critical DLLs ===")
              search = [
                  os.path.dirname(sys.executable),
                  os.path.join(os.environ.get('SYSTEMROOT', r'C:\Windows'), 'System32'),
              ]
              import shutil
              for dll in missing_critical:
                  for d in search:
                      src = os.path.join(d, dll)
                      if os.path.isfile(src):
                          dst = os.path.join(dist_dir, dll)
                          shutil.copy2(src, dst)
                          print(f"  Copied {dll} from {d}")
                          break
                  else:
                      print(f"  ERROR: Could not find {dll} anywhere!")
                      sys.exit(1)

          print("\nAll critical DLLs present.")

      - name: Copy VC++ Redistributable to dist
        shell: powershell
        run: |
          Copy-Item "vc_redist.x64.exe" -Destination "dist\PhotoSorterAI\vc_redist.x64.exe"
          Write-Host "VC++ Redist copied to dist"

      - name: Create Inno Setup script
        shell: bash
        run: |
          cat > installer.iss << 'INNO_EOF'
          [Setup]
          AppName=PhotoSorterAI
          AppVersion=${{ env.APP_VERSION }}
          AppPublisher=PhotoSorterAI
          DefaultDirName={autopf}\PhotoSorterAI
          DefaultGroupName=PhotoSorterAI
          OutputDir=installer_output
          OutputBaseFilename=PhotoSorterAI_Setup_${{ env.APP_VERSION }}
          Compression=lzma2/ultra64
          SolidCompression=yes
          SetupIconFile=assets\icon.ico
          UninstallDisplayIcon={app}\PhotoSorterAI.exe
          ArchitecturesInstallIn64BitMode=x64compatible
          WizardStyle=modern
          PrivilegesRequired=admin

          [Files]
          Source: "dist\PhotoSorterAI\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\PhotoSorterAI"; Filename: "{app}\PhotoSorterAI.exe"
          Name: "{autodesktop}\PhotoSorterAI"; Filename: "{app}\PhotoSorterAI.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"

          [Run]
          Filename: "{app}\vc_redist.x64.exe"; Parameters: "/install /quiet /norestart"; StatusMsg: "Installing Visual C++ Runtime..."; Flags: waituntilterminated; Check: NeedsVCRedist
          Filename: "{app}\PhotoSorterAI.exe"; Description: "Launch PhotoSorterAI"; Flags: nowait postinstall skipifsilent

          [Code]
          function NeedsVCRedist: Boolean;
          var
            Version: Cardinal;
          begin
            Result := not (RegQueryDWordValue(HKLM, 'SOFTWARE\Microsoft\VisualStudio\14.0\VC\Runtimes\x64', 'Installed', Version) and (Version = 1));
          end;
          INNO_EOF

      - name: Build installer with Inno Setup
        run: |
          iscc installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoSorterAI_Setup_${{ env.APP_VERSION }}
          path: installer_output/PhotoSorterAI_Setup_${{ env.APP_VERSION }}.exe
          retention-days: 30

      - name: Upload portable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoSorterAI_Portable_${{ env.APP_VERSION }}
          path: dist/PhotoSorterAI/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: PhotoSorterAI_Setup_${{ env.APP_VERSION }}
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/PhotoSorterAI_Setup_${{ env.APP_VERSION }}.exe
          generate_release_notes: true
          draft: false
          prerelease: false
